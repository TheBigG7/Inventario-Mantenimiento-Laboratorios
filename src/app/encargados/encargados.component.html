<div class="container">
    <div class="card borber-primary mb-2 mt-2">
        <div class="card-header">Encargados de los Laboratorios<mat-icon>face</mat-icon>
            <button type="button" name="button" [routerLink]="[]" class="btn btn-outline-primary"
                (click)="encargados=false">
                Añadir Encargado
            </button>
        </div>
        <div class="card-body text-primary" *ngIf="!encargados">
            <form (ngSubmit)="crearEncargado()" #loginForm="ngForm" class="p-4 border rounded bg-light">
                <!-- Nombre -->
                <div>
                    <br>
                    <mat-form-field appearance="outline" class="d-flex justify-content-center">
                        <mat-label>Nombre: </mat-label>
                        <input matInput placeholder="Nombre Encargado" class="form-control" type="text" id="nombre"
                            [(ngModel)]="encargadoLaboratorio.nombre" name="nombre" required #nombreModel="ngModel">
                        <mat-icon matSuffix>face</mat-icon>
                        <div *ngIf="nombreModel.invalid && (nombreModel.dirty || nombreModel.touched)"
                            class="text-danger">
                            <mat-hint>Correo es requerido.</mat-hint>
                        </div>
                    </mat-form-field>
                </div>
                <!-- apellido -->
                <div>
                    <br>
                    <mat-form-field appearance="outline" class="d-flex justify-content-center">
                        <mat-label>Apellido: </mat-label>
                        <input matInput placeholder="Apellido Encargado" type="text" id="apellido"
                            [(ngModel)]="encargadoLaboratorio.apellido" name="apellido" required
                            #apellidoModel="ngModel">
                        <mat-icon matSuffix>assignment</mat-icon>
                        <div *ngIf="apellidoModel.invalid && (apellidoModel.dirty || apellidoModel.touched)"
                            class="text-danger">
                            <mat-hint>Contraseña es requerida.</mat-hint>
                        </div>
                    </mat-form-field>
                </div>
                <!-- laboratorioAsignado -->

                <!-- tipo -->

                <!-- correo -->
                <div>
                    <br>
                    <mat-form-field appearance="outline" class="d-flex justify-content-center">
                        <mat-label>Correo: </mat-label>
                        <input matInput placeholder="ejemplo@tecazuay.edu.ec" class="form-control" type="email"
                            id="correo" [(ngModel)]="encargadoLaboratorio.correo" name="correo" required
                            #correoModel="ngModel">
                        <mat-icon matSuffix>face</mat-icon>
                        <div *ngIf="correoModel.invalid && (correoModel.dirty || correoModel.touched)"
                            class="text-danger">
                            <mat-hint>Correo es requerido.</mat-hint>
                        </div>
                    </mat-form-field>
                </div>
                <!-- contraseña -->
                <div>
                    <br>
                    <mat-form-field appearance="outline" class="d-flex justify-content-center">
                        <mat-label>Contraseña: </mat-label>
                        <input matInput placeholder="Contraseña" type="password" id="contrasena"
                            [(ngModel)]="encargadoLaboratorio.contrasenia" name="contrasena" required
                            #contrasenaModel="ngModel">
                        <mat-icon matSuffix>assignment</mat-icon>
                        <div *ngIf="contrasenaModel.invalid && (contrasenaModel.dirty || contrasenaModel.touched)"
                            class="text-danger">
                            <mat-hint>Contraseña es requerida.</mat-hint>
                        </div>
                    </mat-form-field>
                </div>
            </form>

            <button type="button" (click)="encargados=true">lista</button><!-- formulario -->

        </div>
        <div class="card-body text-primary" *ngIf="encargados">
            <h5 class="card-title">Listado de encargados</h5>
            <table class="table table-bordered table-striped">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>laboratorio</th>
                        <th>Rol</th>
                        <th>Correo</th>
                        <th>Contraseña</th>
                    </tr>
                </thead>
                <tbody>
                    <tr> <!-- *ngFor="let peri of periodos" -->
                        <td>uno</td><!-- {{peri.id_periodo}} -->
                        <td>dos</td>
                        <td>tres</td>
                        <td>cuatro</td>
                        <td>
                            <button type="button" name="button" [routerLink]="[]"
                                class="btn btn-outline-primary">Editar</button>
                            <button (click)="eliminar()" class="btn btn-outline-danger">Eliminar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
